name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Продолжать выполнение даже если одна версия упала
    continue-on-error: false
    
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
      # Не отменять остальные задачи при ошибке
      fail-fast: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'  # Кэширование зависимостей

    - name: Display Python version
      run: python --version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then 
          echo "Installing from requirements.txt"
          pip install -r requirements.txt
        else
          echo "No requirements.txt found"
        fi
        pip list  # Показать установленные пакеты

    - name: List files
      run: |
        echo "Current directory: $(pwd)"
        ls -la
        echo "Python files:"
        find . -name "*.py" -type f

    - name: Lint with flake8
      run: |
        # Проверка синтаксиса
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Проверка стиля (не останавливает сборку)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      run: |
        pytest -v --tb=short  # Подробный вывод с короткими traceback
